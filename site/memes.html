<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRO_CODEC — Meme Vault</title>
<link rel="stylesheet" href="/site/css/base.css">
</head>
<body>
<div class="scan"></div>
<div class="wrap wrap--wide">

  <div class="site-header">
    <div><span style="font-size:24px">🖼️</span> <h1>MEME VAULT</h1> <span class="version">v2.1</span></div>
    <p class="subtitle">curated bro memes — download, share, deploy</p>
  </div>

  <nav class="site-nav">
    <a href="/">TOOLS</a>
    <a href="/memes.html" class="active">MEME VAULT</a>
  </nav>

  <div id="meme-gallery">
    <div class="text-center" style="padding:40px">
      <span class="loading" style="color:var(--dim)">Loading memes...</span>
    </div>
  </div>

  <div class="site-footer">BRO_CODEC v2.1 // meme vault // bro energy preserved in image form</div>
</div>

<script src="/site/js/supabase.js"></script>
<script src="/site/js/utils.js"></script>
<script>
async function loadMemes() {
  const gallery = document.getElementById('meme-gallery');
  try {
    const memes = await supabase.query('memes', {
      filter: 'is_published=eq.true',
      order: 'created_at.desc',
    });

    if (!memes.length) {
      gallery.innerHTML = `
        <div class="empty-state">
          <div class="icon">🖼️</div>
          <p>No memes yet. The vault is empty.</p>
          <p style="margin-top:8px;font-size:10px">Check back soon — bro energy is being collected.</p>
        </div>`;
      return;
    }

    gallery.innerHTML = `<div class="gallery-grid">${memes.map(m => `
      <div class="gallery-card">
        <img src="${esc(m.image_url || '')}" alt="${esc(m.title)}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22><rect fill=%22%23111%22 width=%22400%22 height=%22300%22/><text x=%2250%25%22 y=%2250%25%22 fill=%22%23333%22 text-anchor=%22middle%22 dy=%22.3em%22 font-family=%22monospace%22>image not found</text></svg>'">
        <div class="gallery-card__info">
          <div class="gallery-card__title">${esc(m.title)}</div>
          <div class="gallery-card__meta">
            <span>${m.tags && m.tags.length ? m.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('') : ''}</span>
            <button class="gallery-card__download" onclick="downloadMeme('${m.id}', '${esc(m.image_url)}', '${esc(m.title)}')">⬇ DOWNLOAD</button>
          </div>
          ${m.description ? `<p style="font-size:10px;color:var(--dim);margin-top:6px">${esc(m.description)}</p>` : ''}
        </div>
      </div>
    `).join('')}</div>`;
  } catch (e) {
    gallery.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Failed to load memes: ${esc(e.message)}</p></div>`;
  }
}

async function downloadMeme(id, url, title) {
  try {
    // Increment download count
    supabase.rpc('increment_download_count', { meme_id: id }).catch(() => {});
    // Trigger download
    const resp = await fetch(url);
    const blob = await resp.blob();
    const ext = url.split('.').pop().split('?')[0] || 'png';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.' + ext;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  } catch {
    window.open(url, '_blank');
  }
}

loadMemes();
</script>
</body>
</html>
